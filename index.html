<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asymmetric Energy Field</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d23;
      --text: #e8e8ea;
      --muted: #8a8f98;
      --accent: #ff8c42;
      --accent-2: #4cc9f0;
      --border: #2a2e36;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    #panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }
    #map { height: 100vh; }
    h1 { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; }
    .group { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
    .group h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 8px 0; font-weight: 500; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 8px; }
    label:first-child { margin-top: 0; }
    input[type="number"], select {
      width: 100%; padding: 6px 8px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 13px; font-family: inherit;
    }
    input[type="file"] { font-size: 12px; }
    button {
      width: 100%; padding: 8px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 4px;
      font-weight: 600; cursor: pointer;
      font-size: 13px;
    }
    button:disabled { background: #555; cursor: not-allowed; }
    button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); font-weight: 500; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .point-display { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
    .point-display.set { color: var(--accent-2); }
    #status { font-size: 11px; color: var(--muted); margin-top: 8px; min-height: 1.4em; }
    .legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .swatch { display: inline-block; width: 60px; height: 8px; border-radius: 2px; background: linear-gradient(to right, #000004, #51127c, #b73779, #fc8961, #fcfdbf); }
    .progress { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress.active { display: block; }
    .progress > .bar { height: 100%; background: var(--accent-2); width: 0; transition: width 0.1s; }
    .meta { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.6; font-family: ui-monospace, monospace; }
    .meta .v { color: var(--text); }
    .leaflet-container { background: #0a0c10; }
    .engine-tag {
      display: inline-block;
      font-size: 10px;
      font-family: ui-monospace, monospace;
      letter-spacing: 0.05em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <h1>Asymmetric Energy Field<span class="engine-tag" id="engine-tag" title="Compute engine in use">…</span></h1>

      <div class="group">
        <h2>1. Load DEM</h2>
        <input type="file" id="dem-file" accept=".tif,.tiff" />
        <div class="meta" id="dem-meta">No DEM loaded.</div>
      </div>

      <div class="group">
        <h2>2. Pick points (click on map)</h2>
        <label>Source</label>
        <div class="point-display" id="src-display">— click map to set —</div>
        <label>Destination (optional)</label>
        <div class="point-display" id="dst-display">— click again to set —</div>
        <button class="secondary" id="clear-points" style="margin-top: 8px;">Clear points</button>
      </div>

      <div class="group">
        <h2>3. Parameters</h2>
        <label>Mode</label>
        <select id="mode">
          <option value="from">From source</option>
          <option value="to">To destination</option>
          <option value="round">Round trip</option>
        </select>
        <div class="row">
          <div>
            <label>α (per metre flat)</label>
            <input type="number" id="alpha" value="0.008" step="0.001" />
          </div>
          <div>
            <label>β (per metre uphill)</label>
            <input type="number" id="beta" value="1.0" step="0.1" />
          </div>
        </div>
        <label>η (downhill recovery, 0–1)</label>
        <input type="number" id="eta" value="0.1" step="0.05" min="0" max="1" />
      </div>

      <button id="run" disabled>Compute</button>
      <div class="progress" id="progress"><div class="bar"></div></div>
      <div id="status"></div>

      <div class="group" style="margin-top: 12px;">
        <h2>Result</h2>
        <div class="meta" id="result-meta">—</div>
        <div class="legend"><span>low</span><span class="swatch"></span><span>high</span></div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
